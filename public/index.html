<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Угадай слово</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Угадай слово</h1>
            <div class="user-info">
                <span id="username">Загрузка...</span>
            </div>
        </header>

        <div id="menu-screen" class="screen active">
            <div class="menu-content">
                <div class="menu-logo">
                    <div class="logo-animation">
                        <span class="logo-letter">У</span>
                        <span class="logo-letter">Г</span>
                        <span class="logo-letter">А</span>
                        <span class="logo-letter">Д</span>
                        <span class="logo-letter">А</span>
                        <span class="logo-letter">Й</span>
                    </div>
                </div>

                <div class="menu-buttons">
                    <button id="play-btn" class="btn btn-primary btn-large">🎮 Играть</button>
                    <button id="menu-stats-btn" class="btn btn-secondary">📊 Статистика</button>
                    <button id="menu-leaderboard-btn" class="btn btn-secondary">🏆 Лидеры</button>
                </div>
            </div>
        </div>

        <div id="game-screen" class="screen">
            <div class="game-info">
                <div class="attempts">Попыток: <span id="attempts">0</span>/6</div>
                <div class="timer">⏱️ <span id="timer">00:00</span></div>
            </div>

            <div id="game-board" class="game-board">
                <!-- Rows will be generated by JS -->
            </div>
            <input
                id="mobile-input"
                class="mobile-input"
                type="text"
                inputmode="text"
                autocomplete="off"
                autocorrect="off"
                autocapitalize="characters"
                enterkeyhint="done"
                spellcheck="false"
                aria-label="Ввод слова"
            >

            <div class="keyboard">
                <div class="keyboard-row">
                    <button class="key" data-key="Й">Й</button>
                    <button class="key" data-key="Ц">Ц</button>
                    <button class="key" data-key="У">У</button>
                    <button class="key" data-key="К">К</button>
                    <button class="key" data-key="Е">Е</button>
                    <button class="key" data-key="Н">Н</button>
                    <button class="key" data-key="Г">Г</button>
                    <button class="key" data-key="Ш">Ш</button>
                    <button class="key" data-key="Щ">Щ</button>
                    <button class="key" data-key="З">З</button>
                    <button class="key" data-key="Х">Х</button>
                </div>
                <div class="keyboard-row">
                    <button class="key" data-key="Ф">Ф</button>
                    <button class="key" data-key="Ы">Ы</button>
                    <button class="key" data-key="В">В</button>
                    <button class="key" data-key="А">А</button>
                    <button class="key" data-key="П">П</button>
                    <button class="key" data-key="Р">Р</button>
                    <button class="key" data-key="О">О</button>
                    <button class="key" data-key="Л">Л</button>
                    <button class="key" data-key="Д">Д</button>
                    <button class="key" data-key="Ж">Ж</button>
                    <button class="key" data-key="Э">Э</button>
                </div>
                <div class="keyboard-row">
                    <button class="key key-wide" data-key="Enter">ВВОД</button>
                    <button class="key" data-key="Я">Я</button>
                    <button class="key" data-key="Ч">Ч</button>
                    <button class="key" data-key="С">С</button>
                    <button class="key" data-key="М">М</button>
                    <button class="key" data-key="И">И</button>
                    <button class="key" data-key="Т">Т</button>
                    <button class="key" data-key="Ь">Ь</button>
                    <button class="key" data-key="Б">Б</button>
                    <button class="key" data-key="Ю">Ю</button>
                    <button class="key key-wide" data-key="Backspace">⌫</button>
                </div>
            </div>

            <div class="actions">
                <button id="back-to-menu-btn" class="btn btn-secondary">← В меню</button>
                <button id="stats-btn" class="btn btn-secondary">📊 Статистика</button>
                <button id="leaderboard-btn" class="btn btn-secondary">🏆 Лидеры</button>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <div class="result-content">
                <h2 id="result-title">🎉 Победа!</h2>
                <div class="result-stats">
                    <div class="stat">
                        <div class="stat-label">Слово</div>
                        <div class="stat-value" id="result-word">СЛОВО</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Попыток</div>
                        <div class="stat-value" id="result-attempts">3/6</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Время</div>
                        <div class="stat-value" id="result-time">01:23</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Очки</div>
                        <div class="stat-value" id="result-score">+150</div>
                    </div>
                </div>
                <p id="result-message" class="result-message">Приходи завтра!</p>
                <button id="new-game-btn" class="btn btn-secondary">🔄 Завтра новое слово</button>
            </div>
        </div>

        <div id="stats-screen" class="screen">
            <div class="stats-content">
                <h2>📊 Ваша статистика</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-number" id="total-games">0</div>
                        <div class="stat-label">Игр сыграно</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="total-wins">0</div>
                        <div class="stat-label">Побед</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-number" id="win-rate">0%</div>
                        <div class="stat-label">Процент побед</div>
                    </div>
                </div>
                <button id="back-from-stats" class="btn btn-primary">← Назад</button>
            </div>
        </div>

        <div id="leaderboard-screen" class="screen">
            <div class="leaderboard-content">
                <h2>🏆 Таблица лидеров</h2>
                <div id="leaderboard-list" class="leaderboard-list">
                    <!-- Will be populated by JS -->
                </div>
                <button id="back-from-leaderboard" class="btn btn-primary">← Назад</button>
            </div>
        </div>

    </div>

    <script src="game.js"></script>
</body>
</html>
